# .github/workflows/ci.yml
name: Civic Transparency Spec CI (Lint, Test, Coverage)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dev deps (extras, editable)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff format (check only, no auto-fix in CI)
        run: ruff format --check .

      - name: Ruff lint (check only, no)
        run: ruff check .

      - name: Run tests (with any validation and coverage)
        run: pytest -q

      - name: Generate coverage summary
        if: always()
        run: python .github/scripts/coverage_summary.py

      - name: Build docs (sanity check)
        run: mkdocs build

      - name: Build HTML coverage and upload
        if: always()
        run: coverage html
      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: htmlcov
          path: htmlcov

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml