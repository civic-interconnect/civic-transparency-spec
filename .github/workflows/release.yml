# .github/workflows/release.yml
name: CT Spec Release (PyPI + GH Release + versioned docs)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # needed to create the GitHub Release + upload assets
  id-token: write   # needed for PyPI Trusted Publishing

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: List artifacts
        run: python .github/scripts/list_artifacts.py

      - name: Create GitHub Release + upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}   # e.g., v0.1.3
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
          draft: false
          prerelease: false
          make_latest: true

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  docs:
    needs: build-and-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write    # allow mike to push to gh-pages
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs deps (from extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Ensure gh-pages branch exists locally
        run: |
          git fetch origin gh-pages:gh-pages || true

      - name: Build docs (fail fast)
        run: mkdocs build

      - name: Deploy versioned docs with Mike
        env:
          TAG: ${{ github.ref_name }}   #  e.g., v0.1.4
        run: |
          VERSION="${TAG#v}"            # 0.1.4
          mike deploy --push --update-aliases latest "$VERSION"
